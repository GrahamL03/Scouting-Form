<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REBUILT Pit Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #121212;
    --card: #1E1E1E;
    --card-raised: #262626;
    --text: #FFFFFF;
    --text-dim: #A0A0A0;
    --accent: #004F9E;
    --accent-hover: #0064C9;
    --border: #303030;
    --green: #2FA86B;
    --red: #D6483C;
    --radius: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
    padding-bottom: 40px;
    min-height: 100vh;
  }

  header {
    padding: 20px 16px;
    background: var(--card);
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header .eyebrow {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--accent-hover);
    font-weight: 700;
    text-transform: uppercase;
  }

  header h1 { margin: 4px 0 0; font-size: 26px; }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 18px 14px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  section.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
  }

  section.card h2 {
    margin: 0 0 14px;
    font-size: 13px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  section.card h2::before {
    content: "";
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background-color: #161616;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 14px 12px;
    font-size: 17px;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  textarea { resize: vertical; min-height: 90px; }

  select {
    background-image: linear-gradient(45deg, transparent 50%, var(--accent-hover) 50%), linear-gradient(135deg, var(--accent-hover) 50%, transparent 50%);
    background-position: calc(100% - 20px) 50%, calc(100% - 14px) 50%;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  /* Image Preview Box */
  .photo-upload-box {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    background: #161616;
    cursor: pointer;
    position: relative;
  }

  .photo-upload-box input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  #imagePreview {
    max-width: 100%;
    max-height: 200px;
    border-radius: 8px;
    display: none;
    margin: 10px auto 0;
  }

  /* Segmented control */
  .segmented {
    display: grid;
    grid-template-columns: repeat(var(--cols, 4), 1fr);
    gap: 8px;
  }

  .segmented input { position: absolute; opacity: 0; pointer-events: none; }

  .segmented label {
    margin: 0;
    background: var(--card-raised);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 6px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .segmented input:checked + label {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }

  button.big {
    width: 100%;
    padding: 18px;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.5px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    touch-action: manipulation;
    transition: background-color 0.15s ease, transform 0.1s ease;
  }

  button.big:active { transform: scale(0.98); }

  #exportBtn { background: var(--accent); color: #fff; }
  #exportBtn:hover { background: var(--accent-hover); }

  #clearBtn {
    background: transparent;
    color: var(--red);
    border: 1.5px solid var(--red);
  }
  #clearBtn:hover { background: rgba(214,72,60,0.12); }

  #qrSection { text-align: center; display: none; }
  #qrSection.visible { display: block; }

  #qrcode {
    background: #fff;
    display: inline-block;
    padding: 14px;
    border-radius: 12px;
    margin: 10px auto 14px;
  }

  #csvPreview {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-dim);
    background: #161616;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    word-break: break-all;
    text-align: left;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    padding: 20px 0 0;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">FRC · Pit Scouting</div>
  <h1>REBUILT Pit Scout</h1>
</header>

<main>

  <section class="card">
    <h2>Team Info</h2>
    <div class="grid-2">
      <div class="field">
        <label for="teamNumber">Team Number</label>
        <input type="number" id="teamNumber" inputmode="numeric" placeholder="e.g. 254">
      </div>
      <div class="field">
        <label for="scoutName">Scout Name</label>
        <input type="text" id="scoutName" placeholder="Your name">
      </div>
    </div>
  </section>

  <section class="card">
    <h2>Robot Photo</h2>
    <div class="photo-upload-box">
      <span id="uploadPrompt" style="font-size: 14px; color: var(--text-dim);">📷 Tap to Take or Upload Photo</span>
      <input type="file" id="robotPhoto" accept="image/*" capture="environment">
      <img id="imagePreview" alt="Robot Preview">
    </div>
  </section>

  <section class="card">
    <h2>Drivebase &amp; Hardware</h2>
    <div class="field">
      <label for="driveType">Drivetrain Type</label>
      <select id="driveType">
        <option value="Swerve (Kraken/Falcon)">Swerve (Kraken/Falcon)</option>
        <option value="Swerve (NEO)">Swerve (NEO)</option>
        <option value="Tank / West Coast">Tank / West Coast Drive</option>
        <option value="Mecanum / Other">Mecanum / Other</option>
      </select>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="weight">Weight (lbs)</label>
        <input type="number" id="weight" inputmode="decimal" placeholder="e.g. 118">
      </div>
      <div class="field">
        <label for="dimensions">Size (W x L in)</label>
        <input type="text" id="dimensions" placeholder="e.g. 28x30">
      </div>
    </div>
  </section>

  <section class="card">
    <h2>Mechanisms &amp; Auto</h2>
    <div class="field">
      <label>Intake Mechanism</label>
      <div class="segmented" style="--cols:3;">
        <input type="radio" name="intakeType" id="intakeOverBumper" value="Ground/UTB" checked>
        <label for="intakeOverBumper">Ground</label>
        <input type="radio" name="intakeType" id="intakeSource" value="Source">
        <label for="intakeSource">Source</label>
        <input type="radio" name="intakeType" id="intakeBoth" value="Both">
        <label for="intakeBoth">Both</label>
      </div>
    </div>

    <div class="field">
      <label for="autoPaths">Auto Pathing Capability</label>
      <select id="autoPaths">
        <option value="Multi-piece Choreo/PathPlanner">Multi-piece (Choreo/PathPlanner)</option>
        <option value="Simple Single/Double Piece">Simple Single/Double Piece</option>
        <option value="Taxi Only">Taxi Only</option>
        <option value="No Reliable Auto">No Reliable Auto</option>
      </select>
    </div>
  </section>

  <section class="card">
    <h2>Pit Observations</h2>
    <div class="field">
      <label for="pitNotes">Pit Scout Notes</label>
      <textarea id="pitNotes" placeholder="Wiring quality, mechanical robustness, driver experience, special features, etc."></textarea>
    </div>
  </section>

  <div class="actions">
    <button class="big" id="exportBtn">Export Pit Data &amp; QR</button>
  </div>

  <section class="card" id="qrSection">
    <h2>Pit Summary QR</h2>
    <div id="qrcode"></div>
    <div id="csvPreview"></div>
  </section>

  <div class="actions">
    <button class="big" id="clearBtn">Clear Pit Form</button>
  </div>

  <footer>Pit Scout Data stays local to device</footer>

</main>

<script>
  let currentPhotoFile = null;

  // Handle Photo Preview
  document.getElementById('robotPhoto').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      currentPhotoFile = file;
      const reader = new FileReader();
      reader.onload = function(event) {
        const preview = document.getElementById('imagePreview');
        preview.src = event.target.result;
        preview.style.display = 'block';
        document.getElementById('uploadPrompt').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }
  });

  function getRadioValue(name) {
    const checked = document.querySelector(`input[name="${name}"]:checked`);
    return checked ? checked.value : '';
  }

  function buildPitCsvRow() {
    const teamNumber = document.getElementById('teamNumber').value.trim();
    const scoutName = document.getElementById('scoutName').value.trim().replace(/[,\n\r]/g, ' ');
    const driveType = document.getElementById('driveType').value;
    const weight = document.getElementById('weight').value.trim();
    const dimensions = document.getElementById('dimensions').value.trim().replace(/[,\n\r]/g, ' ');
    const intakeType = getRadioValue('intakeType');
    const autoPaths = document.getElementById('autoPaths').value;
    const pitNotes = document.getElementById('pitNotes').value.trim().replace(/[,\n\r]/g, ' ');

    return [teamNumber, scoutName, driveType, weight, dimensions, intakeType, autoPaths, pitNotes].join(',');
  }

  document.getElementById('exportBtn').addEventListener('click', () => {
    const teamNumber = document.getElementById('teamNumber').value.trim();
    if (!teamNumber) {
      alert("Please enter a Team Number first!");
      return;
    }

    const csvRow = buildPitCsvRow();

    // 1. Generate QR Code for fast text-only scanning
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: csvRow,
      width: 220,
      height: 220,
      colorDark: '#121212',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById('csvPreview').textContent = csvRow;
    const qrSection = document.getElementById('qrSection');
    qrSection.classList.add('visible');
    qrSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // 2. Download Photo as [TeamNumber].jpg directly into Downloads for easy USB drop
    if (currentPhotoFile) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(currentPhotoFile);
      link.download = `${teamNumber}.jpg`;
      link.click();
    }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('teamNumber').value = '';
    document.getElementById('weight').value = '';
    document.getElementById('dimensions').value = '';
    document.getElementById('pitNotes').value = '';
    document.getElementById('driveType').value = 'Swerve (Kraken/Falcon)';
    document.getElementById('intakeOverBumper').checked = true;
    document.getElementById('autoPaths').value = 'Multi-piece Choreo/PathPlanner';
    
    // Clear Photo
    currentPhotoFile = null;
    document.getElementById('robotPhoto').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('uploadPrompt').style.display = 'inline';

    document.getElementById('qrSection').classList.remove('visible');
    document.getElementById('qrcode').innerHTML = '';
    document.getElementById('csvPreview').textContent = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

</body>
</html>
