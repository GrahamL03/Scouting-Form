<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ShamStrat | Pit Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    
    /* ShamStrat "End Game" Theme Palette */
    --bg: #18181B;
    --card: #27272A;
    --card-raised: #3F3F46;
    --text: #F4F4F5;
    --text-dim: #A1A1AA;
    --accent: #6366F1;
    --accent-hover: #4F46E5;
    --accent-secondary: #3B82F6;
    --border: #3F3F46;
    --green: #10B981;
    --red: #EF4444;
    --radius: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, Roboto, sans-serif;
    padding-bottom: 40px;
    min-height: 100vh;
  }

  header {
    padding: 16px 20px;
    background: var(--card);
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header .eyebrow {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent-secondary);
    font-weight: 700;
    text-transform: uppercase;
  }

  header h1 { margin: 2px 0 0; font-size: 22px; }

  main {
    max-width: 580px;
    margin: 0 auto;
    padding: 18px 14px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  section.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
  }

  section.card h2 {
    margin: 0 0 14px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  section.card h2::before {
    content: "";
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background-color: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  textarea { resize: vertical; min-height: 80px; }

  select {
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%), linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 20px) 50%, calc(100% - 14px) 50%;
    background-size: 6px 6px, 6px 6px;
    background-repeat: no-repeat;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  /* Photo Upload Box */
  .photo-upload-box {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 20px 16px;
    text-align: center;
    background: var(--bg);
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s ease;
  }

  .photo-upload-box:hover {
    border-color: var(--accent);
  }

  .photo-upload-box input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  #imagePreview {
    max-width: 100%;
    max-height: 220px;
    border-radius: 8px;
    display: none;
    margin: 10px auto 0;
    border: 1px solid var(--border);
  }

  /* Segmented control */
  .segmented {
    display: grid;
    grid-template-columns: repeat(var(--cols, 4), 1fr);
    gap: 8px;
  }

  .segmented input { position: absolute; opacity: 0; pointer-events: none; }

  .segmented label {
    margin: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 4px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }

  .segmented input:checked + label {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }

  button.big {
    width: 100%;
    padding: 16px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    touch-action: manipulation;
    transition: background-color 0.15s ease, transform 0.1s ease;
  }

  button.big:active { transform: scale(0.98); }

  #exportBtn { background: var(--accent); color: #fff; }
  #exportBtn:hover { background: var(--accent-hover); }

  #clearBtn {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
  }
  #clearBtn:hover { background: rgba(239, 68, 68, 0.15); }

  #qrSection { text-align: center; display: none; }
  #qrSection.visible { display: block; }

  #qrcode {
    background: #fff;
    display: inline-block;
    padding: 14px;
    border-radius: 10px;
    margin: 10px auto 14px;
  }

  #csvPreview {
    font-family: monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    word-break: break-all;
    text-align: left;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    padding: 20px 0 0;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">SHAMSTRAT PIT HUB</div>
  <h1>Pit Scouting Form</h1>
</header>

<main>

  <section class="card">
    <h2>Team Info</h2>
    <div class="grid-2">
      <div class="field">
        <label for="teamNumber">Team Number *</label>
        <input type="number" id="teamNumber" inputmode="numeric" placeholder="e.g. 254">
      </div>
      <div class="field">
        <label for="scoutName">Scout Name</label>
        <input type="text" id="scoutName" placeholder="Your name">
      </div>
    </div>
  </section>

  <section class="card">
    <h2>Robot Photo</h2>
    <div class="photo-upload-box">
      <span id="uploadPrompt" style="font-size: 13px; color: var(--text-dim); font-weight: 600;">📷 Tap to Take or Upload Photo</span>
      <input type="file" id="robotPhoto" accept="image/*" capture="environment">
      <img id="imagePreview" alt="Robot Preview">
    </div>
  </section>

  <section class="card">
    <h2>Drivebase & Hardware</h2>
    
    <div class="field">
      <label for="driveModule">Swerve / Drivetrain Module</label>
      <select id="driveModule">
        <option value="SDS MK4i">SDS MK4i Swerve</option>
        <option value="SDS MK4n">SDS MK4n Swerve</option>
        <option value="SDS MK5n">SDS MK5n Swerve</option>
        <option value="SDS MK4 / Legacy">SDS MK4 / Legacy Swerve</option>
        <option value="WCP SwerveX / X2">WCP SwerveX / SwerveX2</option>
        <option value="REV MAXSwerve">REV MAXSwerve</option>
        <option value="Custom Swerve">Custom Swerve</option>
        <option value="Tank / West Coast">Tank / West Coast Drive</option>
        <option value="Mecanum / Omni / Other">Mecanum / Omni / Other</option>
      </select>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="driveMotors">Drive Motors</label>
        <select id="driveMotors">
          <option value="Kraken X60">Kraken X60</option>
          <option value="Falcon 500">Falcon 500</option>
          <option value="NEO Vortex">NEO Vortex</option>
          <option value="NEO v1.1">NEO v1.1</option>
          <option value="Brushed / CIM / Other">Brushed / Other</option>
        </select>
      </div>
      <div class="field">
        <label for="weight">Weight (lbs)</label>
        <input type="number" id="weight" inputmode="decimal" placeholder="e.g. 118">
      </div>
    </div>

    <label>Dimensions (Inches - Frame Only)</label>
    <div class="grid-3">
      <div class="field">
        <input type="number" id="dimWidth" placeholder="Width">
      </div>
      <div class="field">
        <input type="number" id="dimLength" placeholder="Length">
      </div>
      <div class="field">
        <input type="number" id="dimHeight" placeholder="Height">
      </div>
    </div>
  </section>

  <section class="card">
    <h2>Mechanisms & Software</h2>
    
    <div class="field">
      <label>Intake Capability</label>
      <div class="segmented" style="--cols:3;">
        <input type="radio" name="intakeType" id="intakeGround" value="Ground" checked>
        <label for="intakeGround">Ground</label>
        <input type="radio" name="intakeType" id="intakeSource" value="Source">
        <label for="intakeSource">Source</label>
        <input type="radio" name="intakeType" id="intakeBoth" value="Both">
        <label for="intakeBoth">Both</label>
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="autoPaths">Auto Capability</label>
        <select id="autoPaths">
          <option value="Multi-Piece (Choreo/PP)">Multi-Piece (Choreo/PP)</option>
          <option value="Simple 1-2 Piece">Simple 1-2 Piece</option>
          <option value="Taxi Only">Taxi Only</option>
          <option value="No Auto">No Auto</option>
        </select>
      </div>
      <div class="field">
        <label for="progLang">Language</label>
        <select id="progLang">
          <option value="Java">Java (WPILib)</option>
          <option value="C++">C++</option>
          <option value="Python">Python</option>
          <option value="LabVIEW">LabVIEW</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="driverExp">Driver Experience Level</label>
      <select id="driverExp">
        <option value="Veteran (2+ Years)">Veteran (2+ Years)</option>
        <option value="1 Year Experience">1 Year Experience</option>
        <option value="Rookie Driver">Rookie Driver</option>
      </select>
    </div>
  </section>

  <section class="card">
    <h2>Quality & Pit Notes</h2>

    <div class="field">
      <label>Wiring & Build Quality (1-5)</label>
      <div class="segmented" style="--cols:5;">
        <input type="radio" name="qualityRating" id="q1" value="1">
        <label for="q1">1</label>
        <input type="radio" name="qualityRating" id="q2" value="2">
        <label for="q2">2</label>
        <input type="radio" name="qualityRating" id="q3" value="3" checked>
        <label for="q3">3</label>
        <input type="radio" name="qualityRating" id="q4" value="4">
        <label for="q4">4</label>
        <input type="radio" name="qualityRating" id="q5" value="5">
        <label for="q5">5</label>
      </div>
    </div>

    <div class="field">
      <label for="pitNotes">Scout Observations</label>
      <textarea id="pitNotes" placeholder="Mechanical stability, custom gearboxes, vision systems, driver confidence, special mechanisms..."></textarea>
    </div>
  </section>

  <div class="actions">
    <button class="big" id="exportBtn">Export Pit Data & QR</button>
  </div>

  <section class="card" id="qrSection">
    <h2>Pit Summary QR Code</h2>
    <div id="qrcode"></div>
    <div id="csvPreview"></div>
  </section>

  <div class="actions">
    <button class="big" id="clearBtn">Clear Pit Form</button>
  </div>

  <footer>Pit Scout Data stays local to device</footer>

</main>

<script>
  let currentPhotoFile = null;

  // Handle Photo Preview
  document.getElementById('robotPhoto').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      currentPhotoFile = file;
      const reader = new FileReader();
      reader.onload = function(event) {
        const preview = document.getElementById('imagePreview');
        preview.src = event.target.result;
        preview.style.display = 'block';
        document.getElementById('uploadPrompt').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }
  });

  function getRadioValue(name) {
    const checked = document.querySelector(`input[name="${name}"]:checked`);
    return checked ? checked.value : '';
  }

  function buildPitCsvRow() {
    const teamNumber = document.getElementById('teamNumber').value.trim();
    const scoutName = document.getElementById('scoutName').value.trim().replace(/[,\n\r]/g, ' ');
    const driveModule = document.getElementById('driveModule').value;
    const driveMotors = document.getElementById('driveMotors').value;
    const weight = document.getElementById('weight').value.trim();
    
    const w = document.getElementById('dimWidth').value.trim() || '0';
    const l = document.getElementById('dimLength').value.trim() || '0';
    const h = document.getElementById('dimHeight').value.trim() || '0';
    const dimensions = `${w}x${l}x${h}`;

    const intakeType = getRadioValue('intakeType');
    const autoPaths = document.getElementById('autoPaths').value;
    const progLang = document.getElementById('progLang').value;
    const driverExp = document.getElementById('driverExp').value;
    const qualityRating = getRadioValue('qualityRating');
    const pitNotes = document.getElementById('pitNotes').value.trim().replace(/[,\n\r]/g, ' ');

    return [
      teamNumber, scoutName, driveModule, driveMotors, weight, 
      dimensions, intakeType, autoPaths, progLang, driverExp, 
      qualityRating, pitNotes
    ].join(',');
  }

  document.getElementById('exportBtn').addEventListener('click', () => {
    const teamNumber = document.getElementById('teamNumber').value.trim();
    if (!teamNumber) {
      alert("Please enter a Team Number first!");
      return;
    }

    const csvRow = buildPitCsvRow();

    // Generate QR Code
    const qrContainer = document.getElementById('qrcode');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: csvRow,
      width: 220,
      height: 220,
      colorDark: "#18181B",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });

    document.getElementById('csvPreview').textContent = csvRow;
    const qrSection = document.getElementById('qrSection');
    qrSection.classList.add('visible');
    qrSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Download Photo with Team Number filename
    if (currentPhotoFile) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(currentPhotoFile);
      link.download = `${teamNumber}.jpg`;
      link.click();
    }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('teamNumber').value = '';
    document.getElementById('weight').value = '';
    document.getElementById('dimWidth').value = '';
    document.getElementById('dimLength').value = '';
    document.getElementById('dimHeight').value = '';
    document.getElementById('pitNotes').value = '';
    document.getElementById('driveModule').value = 'SDS MK4i';
    document.getElementById('driveMotors').value = 'Kraken X60';
    document.getElementById('intakeGround').checked = true;
    document.getElementById('q3').checked = true;
    document.getElementById('autoPaths').value = 'Multi-Piece (Choreo/PP)';
    
    // Clear Photo
    currentPhotoFile = null;
    document.getElementById('robotPhoto').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('uploadPrompt').style.display = 'inline-block';

    document.getElementById('qrSection').classList.remove('visible');
    document.getElementById('qrcode').innerHTML = '';
    document.getElementById('csvPreview').textContent = '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

</body>
</html>
